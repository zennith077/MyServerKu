<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════════
       CONFIGURABLE – EDIT KODE DI SINI
       ─────────────────────────────────────────── */
    /* Lihat <script> di bawah untuk:
       - Nama pemilik / website
       - Username & password per user
       - Kode verifikasi per type server
       - URL redirect dashboard
    */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e17;
      --panel:     #0f1521;
      --border:    #1e2d45;
      --accent:    #00c2ff;
      --accent2:   #0066ff;
      --green:     #00e5a0;
      --red:       #ff3b55;
      --text:      #e8f0fc;
      --muted:     #5a7a9a;
      --input-bg:  #080c14;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Animated background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,194,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,194,255,.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 0 80px; }
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
      animation: breathe 7s ease-in-out infinite alternate;
    }
    .orb-1 { width:400px; height:400px; background:rgba(0,102,255,.18); top:-100px; left:-100px; }
    .orb-2 { width:350px; height:350px; background:rgba(0,194,255,.12); bottom:-80px; right:-80px; animation-delay:-3s; }
    @keyframes breathe {
      from { transform: scale(1);   opacity: .7; }
      to   { transform: scale(1.2); opacity: 1;  }
    }

    /* ══════════ CARD ══════════ */
    .card {
      position: relative; z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      width: 100%; max-width: 440px;
      box-shadow:
        0 0 0 1px rgba(0,194,255,.06),
        0 32px 80px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.04);
      animation: slideUp .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* top accent line */
    .card::before {
      content:'';
      position: absolute; top:0; left:40px; right:40px; height:2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* ══════════ LOGO ══════════ */
    .logo-wrap {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #0a1a30, #0f2540);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(0,194,255,.15);
      flex-shrink: 0;
    }

    .logo-text { line-height: 1; }
    .logo-text .name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-text .tagline {
      font-size: 11px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
      margin-top: 2px;
    }

    /* ══════════ STATUS BADGE ══════════ */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--green);
      background: rgba(0,229,160,.08);
      border: 1px solid rgba(0,229,160,.2);
      padding: 3px 10px; border-radius: 100px;
      margin-bottom: 24px;
    }
    .status-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,229,160,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(0,229,160,0); }
    }

    /* ══════════ HEADING ══════════ */
    .heading { margin-bottom: 28px; }
    .heading h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px; font-weight: 700;
      letter-spacing: .02em;
      color: var(--text);
    }
    .heading p {
      font-size: 13px; color: var(--muted); margin-top: 4px;
    }

    /* ══════════ FORM ══════════ */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    .input-wrap {
      position: relative; display: flex; align-items: center;
    }

    .input-wrap svg.icon {
      position: absolute; left: 14px;
      pointer-events: none;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }

    select { cursor: pointer; }
    select option { background: #0f1521; }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,194,255,.12);
    }

    input::placeholder { color: var(--muted); }

    /* password toggle */
    .pw-toggle {
      position: absolute; right: 14px;
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      padding: 4px; display: flex; align-items: center;
      transition: color .2s;
    }
    .pw-toggle:hover { color: var(--accent); }

    /* ── verification field ── */
    .verify-wrap input {
      letter-spacing: .2em;
      font-family: 'Rajdhani', monospace;
      font-size: 16px; font-weight: 600;
    }

    /* ── hint ── */
    .hint {
      font-size: 11px; color: var(--muted);
      margin-top: 6px;
      display: flex; align-items: center; gap: 5px;
    }

    /* ══════════ BUTTON ══════════ */
    .btn-login {
      width: 100%; margin-top: 8px;
      padding: 14px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform .18s, box-shadow .18s, opacity .18s;
      box-shadow: 0 4px 24px rgba(0,194,255,.25);
    }
    .btn-login:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,194,255,.38); }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { opacity: .7; pointer-events: none; }

    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner  { display: block; }

    /* ══════════ ALERT ══════════ */
    .alert {
      display: none; margin-top: 16px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      animation: fadeIn .25s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .alert.error {
      background: rgba(255,59,85,.1);
      border: 1px solid rgba(255,59,85,.3);
      color: #ff7088;
    }

    /* ══════════ FOOTER ══════════ */
    .card-footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-footer p {
      font-size: 11px; color: var(--muted); letter-spacing: .04em;
    }
    .card-footer a {
      font-size: 11px; color: var(--accent);
      text-decoration: none; letter-spacing: .04em;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ══════════ RESPONSIVE ══════════ */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; margin: 16px; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <!-- ── Logo ── -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <!-- Server SVG logo (online / uptime) -->
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Server body rack 1 -->
          <rect x="3" y="4" width="22" height="7" rx="2" fill="#0a2040" stroke="#1e4a7a" stroke-width="1"/>
          <circle cx="7.5" cy="7.5" r="1.5" fill="#00e5a0"/>
          <rect x="10" y="6" width="8" height="3" rx="1" fill="#0f3060"/>
          <circle cx="22" cy="7.5" r="1" fill="#00c2ff" opacity=".7"/>
          <!-- Server body rack 2 -->
          <rect x="3" y="13" width="22" height="7" rx="2" fill="#0a2040" stroke="#1e4a7a" stroke-width="1"/>
          <circle cx="7.5" cy="16.5" r="1.5" fill="#00e5a0"/>
          <rect x="10" y="15" width="6" height="3" rx="1" fill="#0f3060"/>
          <circle cx="22" cy="16.5" r="1" fill="#00c2ff" opacity=".7"/>
          <!-- Base -->
          <rect x="8" y="21" width="12" height="2.5" rx="1.2" fill="#1e4a7a"/>
          <!-- uptime signal dot -->
          <circle cx="22" cy="4.5" r="2.5" fill="#00e5a0"/>
          <circle cx="22" cy="4.5" r="4" fill="none" stroke="#00e5a0" stroke-width="1" opacity=".4"/>
        </svg>
      </div>
      <div class="logo-text">
        <!-- ★ GANTI nama pemilik di sini ★ -->
        <div class="name" id="ownerName"></div>
        <div class="tagline">KyrooSTR</div>
      </div>
    </div>

    <!-- ── Status ── -->
    <div class="status-badge">
      <span class="dot"></span>
      All Systems Operational
    </div>

    <!-- ── Heading ── -->
    <div class="heading">
      <h1>Login to Dashboard</h1>
      <p>Masukkan kredensial dan kode verifikasi Anda</p>
    </div>

    <!-- ── Form ── -->
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" id="username" placeholder="Masukkan username" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
        <button class="pw-toggle" type="button" onclick="togglePw()" title="Tampilkan/sembunyikan">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Type Server</label>
      <div class="input-wrap">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="5" rx="1"/><rect x="2" y="10" width="20" height="5" rx="1"/>
          <rect x="2" y="17" width="20" height="4" rx="1"/>
          <circle cx="19" cy="5.5" r="1" fill="currentColor"/>
          <circle cx="19" cy="12.5" r="1" fill="currentColor"/>
        </svg>
        <!-- ★ GANTI nama type server di sini ★ -->
        <select id="serverType">
          <option value="">-- Pilih Type Server --</option>
          <option value="production">Standart</option>
          <option value="staging">Premium</option>
          <option value="development">ProQuality</option>
          <option value="testing">Developer</option>
        </select>
      </div>
    </div>

    <div class="field verify-wrap">
      <label>Kode Verifikasi</label>
      <div class="input-wrap">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <input type="password" id="verifyCode" placeholder="ENTER VERIFICATION CODE" maxlength="32"/>
      </div>
      <p class="hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Kode verifikasi hanya diperoleh melalui kontak developer
      </p>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Login ke Dashboard</span>
      <div class="spinner"></div>
    </button>

    <div class="alert error" id="alertBox"></div>

    <!-- Footer -->
    <div class="card-footer">
      <p>© 2025 <span id="footerName"></span></p>
      <a href="mailto:kyroor4layanan@gmail.com">Hubungi Developer</a>
    </div>

  </div>

  <script>
    /* ╔══════════════════════════════════════════════════════╗
       ║           ★  KONFIGURASI – EDIT DI SINI ★           ║
       ╚══════════════════════════════════════════════════════╝ */

    const CONFIG = {

      // ★ Nama pemilik / nama website – ISI DI SINI ★
      ownerName: "",   // contoh: "NamaAnda" atau "PT. Nama Perusahaan"

      // ── Akun yang diizinkan login ──
      // Tambah / hapus sesuai kebutuhan
      users: [
        { username: "kYuUs9rs82",   password: "Kyr0nEw92je" },
        { username: "operator", password: "Oper@5678" },
        // tambahkan akun lain di sini...
      ],

      // ── Kode verifikasi per type server ──
      // Hanya Anda dan developer yang tahu kode ini
      verificationCodes: {
        production:  "MYSERVERKU-8382-KSBW",   // ← ganti dengan kode asli
        staging:     "MYSERVERKU-0381-BSBW",
        development: "MYSERVERKU-3728-SHOW",
        testing:     "MEMEKKUDANIL",
      },

      // ── URL tujuan setelah login berhasil ──
      // Ganti dengan URL dashboard Anda
      dashboardUrls: {
        production:  "https://error-404-down.vercel.app/",
        staging:     "https://error-404-down.vercel.app/",
        development: "https://error-404-down.vercel.app/",
        testing:     "https://dashboard.example.com/testing",
        // atau pakai satu URL untuk semua:
        // default: "https://dashboard.example.com"
      },
    };

    /* ─── Inisialisasi nama dari config ─── */
    const _nm = CONFIG.ownerName || "MyServerKu";
    document.getElementById('ownerName').textContent  = _nm;
    document.getElementById('footerName').textContent = _nm;
    if (!CONFIG.ownerName) {
      ['ownerName','footerName'].forEach(function(id){
        var el = document.getElementById(id);
        el.style.fontStyle = 'italic'; el.style.opacity = '0.4';
      });
    }

    /* ─── Toggle visibility password ─── */
    function togglePw() {
      const pw = document.getElementById('password');
      const ic = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        ic.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        pw.type = 'password';
        ic.innerHTML = `<path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }

    /* ─── Login handler ─── */
    function handleLogin() {
      const username   = document.getElementById('username').value.trim();
      const password   = document.getElementById('password').value;
      const serverType = document.getElementById('serverType').value;
      const verifyCode = document.getElementById('verifyCode').value.trim();
      const alert      = document.getElementById('alertBox');
      const btn        = document.getElementById('loginBtn');

      // reset alert
      alert.style.display = 'none';

      // ── Validasi kosong ──
      if (!username || !password || !serverType || !verifyCode) {
        showError('Semua field wajib diisi.'); return;
      }

      // ── Validasi username & password ──
      const userMatch = CONFIG.users.find(
        u => u.username === username && u.password === password
      );
      if (!userMatch) {
        showError('Username atau password tidak valid.'); return;
      }

      // ── Validasi kode verifikasi ──
      const expectedCode = CONFIG.verificationCodes[serverType];
      if (verifyCode !== expectedCode) {
        showError('Kode verifikasi tidak sesuai untuk server yang dipilih.'); return;
      }

      // ── Semua valid – loading state ──
      btn.classList.add('loading');

      setTimeout(() => {
        const url = CONFIG.dashboardUrls[serverType] || CONFIG.dashboardUrls['default'];
        window.location.href = url;   // redirect ke halaman dashboard
        // Jika ingin buka tab baru gunakan:
        // window.open(url, '_blank');
      }, 900);
    }

    function showError(msg) {
      const a = document.getElementById('alertBox');
      a.textContent = msg;
      a.style.display = 'block';
    }

    /* ─── Enter key trigger ─── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
